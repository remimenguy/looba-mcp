name: Publish

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'pyproject.toml'
      - 'index.js'
      - 'looba_mcp/**'
      - 'scripts/**'
  workflow_dispatch:

# Limit GITHUB_TOKEN to read-only — secrets are passed explicitly per job
permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Read local version
        id: local
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if version exists on npm
        id: check
        run: |
          if npm view looba-mcp@${{ steps.local.outputs.version }} version > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "looba-mcp@${{ steps.local.outputs.version }} already on npm — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Will publish looba-mcp@${{ steps.local.outputs.version }} to npm."
          fi

      - name: Publish
        if: steps.check.outputs.exists == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Read local version
        id: local
        run: echo "version=$(grep -m1 '^version' pyproject.toml | cut -d'\"' -f2)" >> "$GITHUB_OUTPUT"

      - name: Check if version exists on PyPI
        id: check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/looba-mcp/${{ steps.local.outputs.version }}/json")
          if [ "$STATUS" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "looba-mcp ${{ steps.local.outputs.version }} already on PyPI — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Will publish looba-mcp ${{ steps.local.outputs.version }} to PyPI."
          fi

      - name: Install build tools
        if: steps.check.outputs.exists == 'false'
        run: pip install --upgrade build twine

      - name: Build distribution
        if: steps.check.outputs.exists == 'false'
        run: python -m build

      - name: Publish
        if: steps.check.outputs.exists == 'false'
        run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  deploy-server:
    name: Deploy to mcp.looba.dev
    runs-on: ubuntu-latest
    needs: [npm, pypi]
    steps:
      - uses: actions/checkout@v4

      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/looba/looba-mcp
            git fetch origin main
            git reset --hard origin/main
            sudo systemctl restart looba-mcp.service
            sleep 2
            systemctl is-active looba-mcp.service

      - name: Verify deployed version
        run: |
          sleep 3
          RESPONSE=$(curl -s -X POST https://mcp.looba.dev/ \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1.0.0"}}}')
          echo "Server response: $RESPONSE"
          DEPLOYED=$(echo "$RESPONSE" | grep -oE '"version":"[^"]+"' | head -1 | cut -d'"' -f4)
          EXPECTED=$(node -p "require('./package.json').version")
          echo "Deployed: $DEPLOYED"
          echo "Expected: $EXPECTED"
          if [ "$DEPLOYED" != "$EXPECTED" ]; then
            echo "::error::Version mismatch on mcp.looba.dev"
            exit 1
          fi
